<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotOn Design Growth Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#64748B">
      <div style="text-align:center">
        <div style="font-size:40px;margin-bottom:12px">🎨</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">Loading Growth Hub…</div>
        <div style="font-size:13px">Preparing 48 skills across 4 categories</div>
      </div>
    </div>
  </div>

  <!-- SheetJS for Excel/CSV parsing — async so it doesn't block app load -->
  <script async src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- PDF.js for performance review parsing — async so it doesn't block app load -->
  <script async src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" onload="pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'"></script>
  <!-- Tesseract.js for image OCR (performance review PNG/JPG) — async so it doesn't block app load -->
  <script async src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- Skill data must load before app.js -->
  <script src="data/skills.js"></script>
  <script src="seed.js"></script>
  <!-- Real design org — runs after seed.js, removes demo profiles, adds actual team -->
  <script src="org.js?v=2"></script>
  <script src="app.js?v=205"></script>
  <script>
    // If app.js loaded but init() never replaced the loading screen,
    // something crashed silently. Surface the error after 4 seconds.
    setTimeout(function() {
      var app = document.getElementById('app');
      if (app && app.innerHTML.indexOf('Loading Growth Hub') !== -1) {
        app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#64748B"><div style="text-align:center;max-width:380px;padding:24px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:600;color:#0F172A;margin-bottom:8px">Something went wrong</div><div style="font-size:13px;margin-bottom:20px">The app failed to start. Open the browser console (F12) for details.</div><button onclick="location.reload()" style="background:#6366F1;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer">Try again</button></div></div>';
      }
    }, 4000);
  </script>
</body>
</html>
